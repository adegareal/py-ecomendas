<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// ── SUPABASE CONFIG ──
const SUPA_URL = "https://sisnsawccgnsttbxnobm.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpc25zYXdjY2duc3R0Ynhub2JtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NDgxMTgsImV4cCI6MjA5ODMyNDExOH0.0y38nM3wiHih-Yqx5zpd0qBl5RO8biKoCo2PWk6zWHk";
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const STATUS = ["Pendente","Em trânsito","Entregue","Cancelado"];
const STATUS_COLORS = {
  "Pendente":    {bg:"#FFF3CD",text:"#856404",dot:"#FFC107"},
  "Em trânsito": {bg:"#CCE5FF",text:"#004085",dot:"#007BFF"},
  "Entregue":    {bg:"#D4EDDA",text:"#155724",dot:"#28A745"},
  "Cancelado":   {bg:"#F8D7DA",text:"#721C24",dot:"#DC3545"},
};
const ITEM_STATUS = ["Aguardando pagamento","Produto comprado","Item finalizado"];
const ITEM_STATUS_COLORS = {
  "Aguardando pagamento":{bg:"#3D2A00",text:"#FFB347",dot:"#FFB347",icon:"⏳"},
  "Produto comprado":    {bg:"#002D4A",text:"#56CCF2",dot:"#56CCF2",icon:"🛒"},
  "Item finalizado":     {bg:"#0A2E1A",text:"#4ADE80",dot:"#4ADE80",icon:"✅"},
};

const fmtBRL = v => Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const uid    = () => Math.random().toString(36).slice(2,9);
const inp  = {width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.07)",color:"#fff",fontSize:14,outline:"none",boxSizing:"border-box"};
const sel  = {...inp,background:"#1B2B3A",cursor:"pointer"};
const lbl  = {color:"#8BAED4",fontSize:12,fontWeight:700,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:0.6};
const btnP = {flex:1,padding:"11px",borderRadius:8,border:"none",background:"linear-gradient(90deg,#003580,#0052CC)",color:"#fff",fontSize:15,cursor:"pointer",fontWeight:700};
const btnG = {flex:1,padding:"11px",borderRadius:8,border:"1px solid rgba(255,255,255,0.15)",background:"transparent",color:"#8BAED4",fontSize:15,cursor:"pointer",fontWeight:600};
const emptyItem = loja => ({id:uid(),encomenda:"",valor:"",loja,itemStatus:"Aguardando pagamento"});
const norm = v => v.trim();

/* ══ LOGIN ══ */
function Login({onLogin}) {
  const [user,setUser]=useState("");
  const [pass,setPass]=useState("");
  const [nome,setNome]=useState("");
  const [novoUser,setNovoUser]=useState("");
  const [novaSenha,setNovaSenha]=useState("");
  const [erro,setErro]=useState("");
  const [okMsg,setOkMsg]=useState("");
  const [loading,setLoading]=useState(false);
  const [showP,setShowP]=useState(false);
  const [showCreate,setShowCreate]=useState(false);
  const [showNewP,setShowNewP]=useState(false);

  const handleLogin = async () => {
    const username = norm(user);
    if(!username||!pass.trim()){setErro("Preencha usuário e senha.");return;}
    setLoading(true); setErro(""); setOkMsg("");
    try {
      const {data,error} = await sb.from("usuarios").select("*").eq("username",username).eq("senha",pass).single();
      if(error||!data) setErro("Usuário ou senha incorretos.");
      else onLogin(data);
    } catch(e){ setErro("Erro de conexão. Tente novamente."); }
    setLoading(false);
  };

  const handleCreateAccount = async () => {
    const nomeLimpo = norm(nome);
    const username = norm(novoUser);
    const senha = novaSenha.trim();
    if(!nomeLimpo||!username||!senha) { setErro("Preencha nome, usuário e senha para criar a conta."); return; }
    if(senha.length < 4) { setErro("A senha deve ter pelo menos 4 caracteres."); return; }
    setLoading(true); setErro(""); setOkMsg("");
    try {
      const {data:existingUser,error:existingError} = await sb.from("usuarios").select("id").eq("username",username).maybeSingle();
      if(existingError) {
        setErro("Não foi possível verificar o usuário.");
      } else if(existingUser) {
        setErro("Este usuário já existe.");
      } else {
        const {error:createError} = await sb.from("usuarios").insert({ username, senha, nome:nomeLimpo, role:"viewer" });
        if(createError) setErro("Não foi possível criar a conta.");
        else {
          setNome(""); setNovoUser(""); setNovaSenha(""); setShowCreate(false);
          setUser(username); setPass("");
          setOkMsg("Conta criada com sucesso. Agora faça login.");
        }
      }
    } catch(e) {
      setErro("Não foi possível criar a conta.");
    }
    setLoading(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0D1B2A,#1B2B3A)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#13243A",borderRadius:20,padding:36,width:"100%",maxWidth:380,border:"1px solid rgba(255,255,255,0.10)",boxShadow:"0 24px 60px rgba(0,0,0,0.6)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:48,marginBottom:10}}>🛃</div>
          <div style={{color:"#fff",fontSize:22,fontWeight:800}}>PY Encomendas</div>
          <div style={{color:"#8BAED4",fontSize:13,marginTop:4}}>{showCreate?"Crie sua conta para continuar":"Faça login para continuar"}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {showCreate ? (
            <>
              <div>
                <label style={lbl}>Nome</label>
                <input value={nome} onChange={e=>setNome(e.target.value)} placeholder="Seu nome" style={inp} autoFocus/>
              </div>
              <div>
                <label style={lbl}>Usuário</label>
                <input value={novoUser} onChange={e=>setNovoUser(e.target.value)} placeholder="Escolha um usuário"
                  onKeyDown={e=>e.key==="Enter"&&handleCreateAccount()} style={inp}/>
              </div>
              <div>
                <label style={lbl}>Senha</label>
                <div style={{position:"relative"}}>
                  <input type={showNewP?"text":"password"} value={novaSenha} onChange={e=>setNovaSenha(e.target.value)}
                    placeholder="Crie uma senha" onKeyDown={e=>e.key==="Enter"&&handleCreateAccount()}
                    style={{...inp,paddingRight:44}}/>
                  <button type="button" onClick={()=>setShowNewP(p=>!p)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#8BAED4",cursor:"pointer",fontSize:16}}>
                    {showNewP?"🙈":"👁️"}
                  </button>
                </div>
              </div>
            </>
          ) : (
            <>
              <div>
                <label style={lbl}>Usuário</label>
                <input value={user} onChange={e=>setUser(e.target.value)} placeholder="Seu usuário"
                  onKeyDown={e=>e.key==="Enter"&&handleLogin()} style={inp} autoFocus/>
              </div>
              <div>
                <label style={lbl}>Senha</label>
                <div style={{position:"relative"}}>
                  <input type={showP?"text":"password"} value={pass} onChange={e=>setPass(e.target.value)}
                    placeholder="Sua senha" onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                    style={{...inp,paddingRight:44}}/>
                  <button type="button" onClick={()=>setShowP(p=>!p)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#8BAED4",cursor:"pointer",fontSize:16}}>
                    {showP?"🙈":"👁️"}
                  </button>
                </div>
              </div>
            </>
          )}
          {erro&&<div style={{background:"rgba(220,53,69,0.15)",border:"1px solid rgba(220,53,69,0.3)",color:"#FF6B7A",borderRadius:8,padding:"8px 12px",fontSize:13}}>{erro}</div>}
          {okMsg&&<div style={{background:"rgba(40,167,69,0.15)",border:"1px solid rgba(40,167,69,0.3)",color:"#7CFF9A",borderRadius:8,padding:"8px 12px",fontSize:13}}>{okMsg}</div>}
          <button onClick={showCreate?handleCreateAccount:handleLogin} disabled={loading}
            style={{...btnP,flex:"none",marginTop:4,padding:"12px",opacity:loading?0.7:1}}>
            {loading ? (showCreate?"Criando conta...":"Entrando...") : (showCreate?"Criar conta":"Entrar")}
          </button>
          <button onClick={()=>{ setShowCreate(v=>!v); setErro(""); setOkMsg(""); }} disabled={loading}
            style={{...btnG,flex:"none",padding:"12px"}}>
            {showCreate?"Já tenho conta":"Criar conta"}
          </button>
        </div>
        <div style={{color:"#5A7A99",fontSize:11,textAlign:"center",marginTop:20}}>PY Encomendas · Acesso restrito</div>
      </div>
    </div>
  );
}

/* ══ MAIN APP ══ */
function Main({user,onLogout}) {
  const isAdmin = user.role==="admin";
  const [pedidos,setPedidos]   = useState([]);
  const [lojas,setLojas]       = useState([]);
  const [usuarios,setUsuarios] = useState([]);
  const [loading,setLoading]   = useState(true);
  const [saving,setSaving]     = useState(false);
  const [savingUser,setSavingUser] = useState(false);
  const [showForm,setShowForm] = useState(false);
  const [showLojas,setShowLojas] = useState(false);
  const [showUsuarios,setShowUsuarios] = useState(false);
  const [showDetail,setShowDetail] = useState(null);
  const [editId,setEditId]     = useState(null);
  const [search,setSearch]     = useState("");
  const [filterStatus,setFilterStatus] = useState("Todos");
  const [confirmDelete,setConfirmDelete] = useState(null);
  const [confirmDeleteLoja,setConfirmDeleteLoja] = useState(null);
  const [novaLoja,setNovaLoja] = useState("");
  const [novoUsuario,setNovoUsuario] = useState({ nome:"", username:"", senha:"", role:"viewer" });
  const [editLojaIdx,setEditLojaIdx] = useState(null);
  const [editLojaVal,setEditLojaVal] = useState("");
  const [showLogout,setShowLogout] = useState(false);
  const [toast,setToast]       = useState(null);

  const defaultLoja = lojas[0]?.nome || "";
  const [form,setForm] = useState({cliente:"",status:"Pendente",data:new Date().toISOString().split("T")[0],taxa:"",itens:[emptyItem("")]});

  const showToast = (msg,type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  // ── CARREGAR DADOS ──
  const loadAll = useCallback(async()=>{
    setLoading(true);
    try {
      const [{data:lj},{data:ped},{data:itns},{data:usrs}] = await Promise.all([
        sb.from("lojas").select("*").order("nome"),
        sb.from("pedidos").select("*").order("created_at",{ascending:false}),
        sb.from("itens").select("*").order("created_at"),
        sb.from("usuarios").select("id, nome, username, role").order("created_at",{ascending:false}),
      ]);
      setLojas(lj||[]);
      setUsuarios(usrs||[]);
      const pedidosComItens = (ped||[]).map(p=>({
        ...p, taxa:Number(p.taxa)||0,
        itens:(itns||[]).filter(i=>i.pedido_id===p.id).map(i=>({...i,valor:Number(i.valor)||0,itemStatus:i.item_status}))
      }));
      setPedidos(pedidosComItens);
    } catch(e){ showToast("Erro ao carregar dados.","error"); }
    setLoading(false);
  },[]);

  useEffect(()=>{ loadAll(); },[loadAll]);

  const totals = useMemo(()=>({
    total:   pedidos.length,
    valor:   pedidos.reduce((s,p)=>s+p.itens.reduce((ss,i)=>ss+i.valor,0)+p.taxa,0),
    taxas:   pedidos.reduce((s,p)=>s+p.taxa,0),
    pendente:pedidos.filter(p=>p.status==="Pendente").length,
    entregue:pedidos.filter(p=>p.status==="Entregue").length,
  }),[pedidos]);

  const totalProdutos = p => p.itens.reduce((s,i)=>s+Number(i.valor||0),0);
  const totalPedido   = p => totalProdutos(p)+Number(p.taxa||0);

  const filtered = useMemo(()=>pedidos.filter(p=>{
    const q=search.toLowerCase();
    const ms=p.cliente.toLowerCase().includes(q)||p.itens.some(i=>i.encomenda.toLowerCase().includes(q)||i.loja.toLowerCase().includes(q));
    return ms&&(filterStatus==="Todos"||p.status===filterStatus);
  }),[pedidos,search,filterStatus]);

  // ── SALVAR PEDIDO ──
  const openNew = ()=>{ setForm({cliente:"",status:"Pendente",data:new Date().toISOString().split("T")[0],taxa:"",itens:[emptyItem(defaultLoja)]}); setEditId(null); setShowForm(true); };
  const openEdit = p=>{ setForm({cliente:p.cliente,status:p.status,data:p.data,taxa:String(p.taxa||""),itens:p.itens.map(i=>({...i,valor:String(i.valor)}))}); setEditId(p.id); setShowForm(true); };

  const save = async()=>{
    if(!form.cliente.trim()) return;
    const itens=form.itens.filter(i=>i.encomenda.trim()).map(i=>({...i,valor:Number(i.valor)||0}));
    if(!itens.length) return;
    setSaving(true);
    try {
      const taxa=Number(form.taxa)||0;
      if(editId){
        await sb.from("pedidos").update({cliente:form.cliente,status:form.status,data:form.data,taxa}).eq("id",editId);
        await sb.from("itens").delete().eq("pedido_id",editId);
        await sb.from("itens").insert(itens.map(i=>({pedido_id:editId,encomenda:i.encomenda,valor:i.valor,loja:i.loja,item_status:i.itemStatus})));
        showToast("Pedido atualizado!");
      } else {
        const {data:newP} = await sb.from("pedidos").insert({cliente:form.cliente,status:form.status,data:form.data,taxa}).select().single();
        await sb.from("itens").insert(itens.map(i=>({pedido_id:newP.id,encomenda:i.encomenda,valor:i.valor,loja:i.loja,item_status:i.itemStatus})));
        showToast("Pedido criado!");
      }
      await loadAll(); setShowForm(false);
    } catch(e){ showToast("Erro ao salvar pedido.","error"); }
    setSaving(false);
  };

  const delPedido = async id=>{
    try {
      await sb.from("pedidos").delete().eq("id",id);
      await loadAll(); setConfirmDelete(null); setShowDetail(null);
      showToast("Pedido excluído.");
    } catch(e){ showToast("Erro ao excluir.","error"); }
  };

  const setItem    = (idx,key,val)=>setForm(f=>({...f,itens:f.itens.map((it,i)=>i===idx?{...it,[key]:val}:it)}));
  const addItem    = ()=>setForm(f=>({...f,itens:[...f.itens,emptyItem(defaultLoja)]}));
  const removeItem = idx=>setForm(f=>({...f,itens:f.itens.filter((_,i)=>i!==idx)}));

  // ── LOJAS ──
  const addLoja = async()=>{
    const n=novaLoja.trim(); if(!n) return;
    try { await sb.from("lojas").insert({nome:n}); await loadAll(); setNovaLoja(""); showToast("Loja adicionada!"); }
    catch(e){ showToast("Erro ao adicionar loja.","error"); }
  };
  const saveEditLoja = async idx=>{
    const novo=editLojaVal.trim(); if(!novo) return;
    const loja=lojas[idx];
    try {
      await sb.from("lojas").update({nome:novo}).eq("id",loja.id);
      await sb.from("itens").update({loja:novo}).eq("loja",loja.nome);
      await loadAll(); setEditLojaIdx(null); showToast("Loja atualizada!");
    } catch(e){ showToast("Erro ao editar loja.","error"); }
  };
  const deleteLoja = async idx=>{
    const loja=lojas[idx];
    try {
      await sb.from("lojas").delete().eq("id",loja.id);
      await loadAll(); setConfirmDeleteLoja(null); showToast("Loja excluída.");
    } catch(e){ showToast("Erro ao excluir loja.","error"); }
  };

  const createUsuario = async()=>{
    const nome = norm(novoUsuario.nome);
    const username = norm(novoUsuario.username);
    const senha = novoUsuario.senha.trim();
    if(!nome||!username||!senha) {
      showToast("Preencha nome, usuário e senha.","error");
      return;
    }
    if(senha.length < 4) {
      showToast("A senha deve ter pelo menos 4 caracteres.","error");
      return;
    }
    setSavingUser(true);
    try {
      const {data:existingUser,error:existingError} = await sb.from("usuarios").select("id").eq("username",username).maybeSingle();
      if(existingError) {
        showToast("Erro ao verificar usuário.","error");
      } else if(existingUser) {
        showToast("Este usuário já existe.","error");
      } else {
        const {error:createError} = await sb.from("usuarios").insert({
          nome,
          username,
          senha,
          role:novoUsuario.role,
        });
        if(createError) showToast("Erro ao criar usuário.","error");
        else {
          setNovoUsuario({ nome:"", username:"", senha:"", role:"viewer" });
          await loadAll();
          showToast("Usuário criado com sucesso!");
        }
      }
    } catch(e) {
      showToast("Erro ao criar usuário.","error");
    }
    setSavingUser(false);
  };

  if(loading) return (

    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0D1B2A,#1B2B3A)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:40}}>🛃</div>
      <div style={{color:"#8BAED4",fontSize:15}}>Carregando dados...</div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0D1B2A,#1B2B3A)",fontFamily:"'Segoe UI',system-ui,sans-serif",paddingBottom:40}}>

      {/* TOAST */}
      {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:999,background:toast.type==="error"?"#DC3545":"#28A745",color:"#fff",borderRadius:10,padding:"10px 18px",fontWeight:600,fontSize:14,boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>
        {toast.type==="error"?"❌":"✅"} {toast.msg}
      </div>}

      {/* HEADER */}
      <div style={{background:"linear-gradient(90deg,#003580,#0052CC)",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",rowGap:8,boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>
        <div style={{fontSize:26}}>🛃</div>
        <div>
          <div style={{color:"#fff",fontSize:19,fontWeight:800}}>PY Encomendas</div>
          <div style={{color:"#90B4E8",fontSize:11}}>Gestão de mercadorias importadas do Paraguai</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          {isAdmin&&<>
            <button onClick={()=>setShowUsuarios(true)} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"7px 13px",fontWeight:600,fontSize:13,cursor:"pointer"}}>👥 Usuários</button>
            <button onClick={()=>setShowLojas(true)} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"7px 13px",fontWeight:600,fontSize:13,cursor:"pointer"}}>🏪 Lojas</button>
            <button onClick={openNew} style={{background:"#FFD700",color:"#0D1B2A",border:"none",borderRadius:8,padding:"7px 15px",fontWeight:700,fontSize:13,cursor:"pointer"}}>+ Novo Pedido</button>
          </>}

          <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.1)",borderRadius:8,padding:"6px 12px",cursor:"pointer"}} onClick={()=>setShowLogout(true)}>
            <div style={{width:28,height:28,borderRadius:"50%",background:"#FFD700",display:"flex",alignItems:"center",justifyContent:"center",color:"#0D1B2A",fontWeight:800,fontSize:12}}>{user.nome.charAt(0)}</div>
            <span style={{color:"#fff",fontSize:13,fontWeight:600}}>{user.nome}</span>
            <span style={{color:"#90B4E8",fontSize:10}}>{isAdmin?"Admin":"Visualizador"}</span>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1000,margin:"0 auto",padding:"20px 14px 0"}}>

        {/* CARDS */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginBottom:20}}>
          {[
            {label:"Clientes",    value:totals.total,          icon:"👤",color:"#4A90D9"},
            {label:"Total Geral", value:fmtBRL(totals.valor),  icon:"💰",color:"#28A745"},
            {label:"Em Taxas",    value:fmtBRL(totals.taxas),  icon:"🤝",color:"#A78BFA"},
            {label:"Pendentes",   value:totals.pendente,        icon:"⏳",color:"#FFC107"},
            {label:"Entregues",   value:totals.entregue,        icon:"✅",color:"#20C997"},
          ].map(c=>(
            <div key={c.label} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.10)",borderRadius:12,padding:"14px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:18}}>{c.icon}</span>
                <span style={{width:7,height:7,borderRadius:"50%",background:c.color,display:"inline-block",marginTop:4}}/>
              </div>
              <div style={{color:"#fff",fontSize:18,fontWeight:800}}>{c.value}</div>
              <div style={{color:"#8BAED4",fontSize:11,marginTop:2}}>{c.label}</div>
            </div>
          ))}
        </div>

        {/* FILTROS */}
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
          <input placeholder="🔍  Buscar cliente, produto ou loja..." value={search} onChange={e=>setSearch(e.target.value)}
            style={{flex:1,minWidth:180,padding:"8px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.08)",color:"#fff",fontSize:13,outline:"none"}}/>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}
            style={{padding:"8px 11px",borderRadius:8,border:"1px solid rgba(255,255,255,0.15)",background:"#1B2B3A",color:"#fff",fontSize:12,cursor:"pointer"}}>
            <option value="Todos">Todos os status</option>
            {STATUS.map(s=><option key={s}>{s}</option>)}
          </select>
          <button onClick={loadAll} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",color:"#8BAED4",borderRadius:8,padding:"8px 12px",fontSize:13,cursor:"pointer"}} title="Atualizar">🔄</button>
        </div>

        {/* LISTA */}
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {filtered.length===0&&(
            <div style={{textAlign:"center",color:"#5A7A99",padding:40,background:"rgba(255,255,255,0.03)",borderRadius:14,border:"1px solid rgba(255,255,255,0.08)"}}>Nenhum pedido encontrado.</div>
          )}
          {filtered.map(p=>{
            const sc=STATUS_COLORS[p.status];
            const isOpen=showDetail===p.id;
            return (
              <div key={p.id} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.10)",borderRadius:13,overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",flexWrap:"wrap",rowGap:8}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,#003580,#0052CC)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:13,flexShrink:0}}>
                    {p.cliente.charAt(0).toUpperCase()}
                  </div>
                  <div style={{flex:1,minWidth:100}}>
                    <div style={{color:"#fff",fontWeight:700,fontSize:14}}>{p.cliente}</div>
                    <div style={{color:"#8BAED4",fontSize:11,marginTop:2}}>
                      {p.itens.length} {p.itens.length===1?"produto":"produtos"} · {new Date(p.data+"T12:00:00").toLocaleDateString("pt-BR")}
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{color:"#4ADE80",fontWeight:800,fontSize:14}}>{fmtBRL(totalPedido(p))}</div>
                    {p.taxa>0&&<div style={{color:"#A78BFA",fontSize:10,fontWeight:600}}>taxa: {fmtBRL(p.taxa)}</div>}
                    <span style={{background:sc.bg,color:sc.text,padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700,display:"inline-flex",alignItems:"center",gap:4,marginTop:3}}>
                      <span style={{width:5,height:5,borderRadius:"50%",background:sc.dot,display:"inline-block"}}/>{p.status}
                    </span>
                  </div>
                  <div style={{display:"flex",gap:5}}>
                    <button onClick={()=>setShowDetail(isOpen?null:p.id)} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",color:"#C5D8F0",borderRadius:7,padding:"5px 9px",fontSize:11,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>
                      {isOpen?"▲ Fechar":"▼ Produtos"}
                    </button>
                    {isAdmin&&<>
                      <button onClick={()=>openEdit(p)} style={{background:"rgba(0,82,204,0.3)",border:"1px solid rgba(0,82,204,0.5)",color:"#90B4E8",borderRadius:7,padding:"5px 9px",fontSize:11,cursor:"pointer",fontWeight:600}}>✏️</button>
                      <button onClick={()=>setConfirmDelete(p.id)} style={{background:"rgba(220,53,69,0.2)",border:"1px solid rgba(220,53,69,0.4)",color:"#FF6B7A",borderRadius:7,padding:"5px 9px",fontSize:11,cursor:"pointer",fontWeight:600}}>🗑️</button>
                    </>}
                  </div>
                </div>
                {isOpen&&(
                  <div style={{borderTop:"1px solid rgba(255,255,255,0.08)",padding:"0 16px 13px"}}>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",marginTop:10}}>
                        <thead><tr>{["Produto","Loja","Situação","Valor"].map(h=>(
                          <th key={h} style={{textAlign:"left",color:"#5A7A99",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6,padding:"4px 7px",whiteSpace:"nowrap"}}>{h}</th>
                        ))}</tr></thead>
                        <tbody>
                          {p.itens.map((it,idx)=>{
                            const isc=ITEM_STATUS_COLORS[it.itemStatus]||ITEM_STATUS_COLORS["Aguardando pagamento"];
                            return(
                              <tr key={it.id} style={{background:idx%2===0?"rgba(255,255,255,0.02)":"transparent"}}>
                                <td style={{padding:"7px 7px",color:"#C5D8F0",fontSize:13}}>{it.encomenda}</td>
                                <td style={{padding:"7px 7px",color:"#8BAED4",fontSize:12,whiteSpace:"nowrap"}}>{it.loja}</td>
                                <td style={{padding:"7px 7px"}}>
                                  <span style={{background:isc.bg,color:isc.text,padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:700,display:"inline-flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}>
                                    <span style={{width:5,height:5,borderRadius:"50%",background:isc.dot,display:"inline-block"}}/>{isc.icon} {it.itemStatus}
                                  </span>
                                </td>
                                <td style={{padding:"7px 7px",color:"#4ADE80",fontWeight:700,fontSize:13,whiteSpace:"nowrap"}}>{fmtBRL(it.valor)}</td>
                              </tr>
                            );
                          })}
                          <tr style={{borderTop:"1px solid rgba(255,255,255,0.08)"}}>
                            <td colSpan={3} style={{padding:"6px 7px",color:"#8BAED4",fontSize:12}}>Subtotal produtos</td>
                            <td style={{padding:"6px 7px",color:"#C5D8F0",fontWeight:700,fontSize:12}}>{fmtBRL(totalProdutos(p))}</td>
                          </tr>
                          <tr style={{background:"rgba(167,139,250,0.05)"}}>
                            <td colSpan={3} style={{padding:"6px 7px",color:"#A78BFA",fontWeight:700,fontSize:12}}>🤝 Taxa de serviço</td>
                            <td style={{padding:"6px 7px",color:"#A78BFA",fontWeight:700,fontSize:12}}>{fmtBRL(p.taxa||0)}</td>
                          </tr>
                          <tr style={{background:"rgba(74,222,128,0.05)",borderTop:"1px solid rgba(74,222,128,0.15)"}}>
                            <td colSpan={3} style={{padding:"7px 7px",color:"#4ADE80",fontWeight:800,fontSize:13}}>💰 Total geral</td>
                            <td style={{padding:"7px 7px",color:"#4ADE80",fontWeight:800,fontSize:13}}>{fmtBRL(totalPedido(p))}</td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div style={{color:"#5A7A99",fontSize:11,marginTop:10,textAlign:"right"}}>{filtered.length} de {pedidos.length} pedido(s)</div>
      </div>

      {/* MODAL PEDIDO */}
      {showForm&&isAdmin&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:12}}>
          <div style={{background:"#13243A",borderRadius:18,padding:22,width:"100%",maxWidth:500,border:"1px solid rgba(255,255,255,0.12)",boxShadow:"0 24px 60px rgba(0,0,0,0.6)",maxHeight:"94vh",overflowY:"auto",display:"flex",flexDirection:"column",gap:12}}>
            <div style={{color:"#fff",fontSize:17,fontWeight:800}}>{editId?"✏️ Editar Pedido":"📦 Novo Pedido"}</div>
            <div><label style={lbl}>Nome do Cliente</label><input value={form.cliente} onChange={e=>setForm(f=>({...f,cliente:e.target.value}))} placeholder="Ex: Maria Silva" style={inp}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><label style={lbl}>Data</label><input type="date" value={form.data} onChange={e=>setForm(f=>({...f,data:e.target.value}))} style={inp}/></div>
              <div><label style={lbl}>Status</label><select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={sel}>{STATUS.map(s=><option key={s}>{s}</option>)}</select></div>
            </div>
            <div style={{background:"rgba(167,139,250,0.08)",border:"1px solid rgba(167,139,250,0.25)",borderRadius:10,padding:12}}>
              <label style={{...lbl,color:"#A78BFA"}}>🤝 Taxa de Serviço (R$)</label>
              <input type="number" placeholder="Ex: 80.00" value={form.taxa} onChange={e=>setForm(f=>({...f,taxa:e.target.value}))} style={{...inp,border:"1px solid rgba(167,139,250,0.3)"}}/>
              <div style={{color:"#7C6AA0",fontSize:11,marginTop:5}}>Valor combinado com o cliente pelo serviço de busca.</div>
            </div>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                <label style={{...lbl,marginBottom:0}}>Produtos ({form.itens.length})</label>
                <button onClick={addItem} style={{background:"rgba(255,215,0,0.15)",border:"1px solid rgba(255,215,0,0.4)",color:"#FFD700",borderRadius:7,padding:"4px 10px",fontSize:12,cursor:"pointer",fontWeight:700}}>+ Produto</button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {form.itens.map((it,idx)=>(
                  <div key={it.id} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.10)",borderRadius:10,padding:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <span style={{color:"#8BAED4",fontSize:11,fontWeight:700}}>PRODUTO {idx+1}</span>
                      {form.itens.length>1&&<button onClick={()=>removeItem(idx)} style={{background:"none",border:"none",color:"#FF6B7A",cursor:"pointer",fontSize:12,fontWeight:700}}>✕ Remover</button>}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      <input placeholder="Nome do produto" value={it.encomenda} onChange={e=>setItem(idx,"encomenda",e.target.value)} style={inp}/>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                        <input type="number" placeholder="Valor (R$)" value={it.valor} onChange={e=>setItem(idx,"valor",e.target.value)} style={inp}/>
                        <select value={it.loja} onChange={e=>setItem(idx,"loja",e.target.value)} style={sel}>
                          {lojas.length===0&&<option value="">Sem lojas</option>}
                          {lojas.map(l=><option key={l.id} value={l.nome}>{l.nome}</option>)}
                        </select>
                      </div>
                      <select value={it.itemStatus} onChange={e=>setItem(idx,"itemStatus",e.target.value)} style={{...sel,color:ITEM_STATUS_COLORS[it.itemStatus]?.text||"#fff",fontWeight:600}}>
                        {ITEM_STATUS.map(s=><option key={s} value={s}>{ITEM_STATUS_COLORS[s].icon} {s}</option>)}
                      </select>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.10)",borderRadius:10,overflow:"hidden"}}>
              <div style={{display:"flex",justifyContent:"space-between",padding:"8px 12px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                <span style={{color:"#8BAED4",fontSize:13}}>Subtotal produtos</span>
                <span style={{color:"#C5D8F0",fontWeight:600,fontSize:13}}>{fmtBRL(form.itens.reduce((s,i)=>s+(Number(i.valor)||0),0))}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",padding:"8px 12px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                <span style={{color:"#A78BFA",fontSize:13}}>🤝 Taxa de serviço</span>
                <span style={{color:"#A78BFA",fontWeight:600,fontSize:13}}>{fmtBRL(Number(form.taxa)||0)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",padding:"9px 12px",background:"rgba(74,222,128,0.06)"}}>
                <span style={{color:"#4ADE80",fontSize:14,fontWeight:700}}>💰 Total geral</span>
                <span style={{color:"#4ADE80",fontWeight:800,fontSize:15}}>{fmtBRL(form.itens.reduce((s,i)=>s+(Number(i.valor)||0),0)+(Number(form.taxa)||0))}</span>
              </div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowForm(false)} style={btnG}>Cancelar</button>
              <button onClick={save} disabled={saving} style={{...btnP,opacity:saving?0.7:1}}>{saving?"Salvando...":editId?"Salvar":"Criar pedido"}</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL LOJAS */}
      {showLojas&&isAdmin&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>
          <div style={{background:"#13243A",borderRadius:18,padding:24,width:"100%",maxWidth:420,border:"1px solid rgba(255,255,255,0.12)",boxShadow:"0 24px 60px rgba(0,0,0,0.6)",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{color:"#fff",fontSize:17,fontWeight:800,marginBottom:4}}>🏪 Gerenciar Lojas</div>
            <div style={{color:"#8BAED4",fontSize:13,marginBottom:14}}>Cadastre as lojas onde você compra no Paraguai.</div>
            <div style={{display:"flex",gap:7,marginBottom:12}}>
              <input placeholder="Nome da loja..." value={novaLoja} onChange={e=>setNovaLoja(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addLoja()} style={{...inp,flex:1}}/>
              <button onClick={addLoja} style={{background:"#FFD700",color:"#0D1B2A",border:"none",borderRadius:8,padding:"10px 12px",fontWeight:700,fontSize:13,cursor:"pointer"}}>+ Adicionar</button>
            </div>
            {lojas.length===0
              ?<div style={{textAlign:"center",color:"#5A7A99",padding:"18px 0"}}>Nenhuma loja cadastrada.</div>
              :<div style={{display:"flex",flexDirection:"column",gap:6}}>
                {lojas.map((loja,idx)=>(
                  <div key={loja.id} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.10)",borderRadius:10,padding:"8px 11px",display:"flex",alignItems:"center",gap:7}}>
                    <span>🏬</span>
                    {editLojaIdx===idx
                      ?<>
                        <input value={editLojaVal} onChange={e=>setEditLojaVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveEditLoja(idx)} style={{...inp,flex:1,padding:"5px 8px"}} autoFocus/>
                        <button onClick={()=>saveEditLoja(idx)} style={{background:"#28A745",border:"none",color:"#fff",borderRadius:6,padding:"4px 9px",fontSize:12,cursor:"pointer",fontWeight:700}}>✓</button>
                        <button onClick={()=>setEditLojaIdx(null)} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#aaa",borderRadius:6,padding:"4px 7px",fontSize:12,cursor:"pointer"}}>✕</button>
                      </>
                      :<>
                        <span style={{color:"#fff",fontWeight:600,fontSize:13,flex:1}}>{loja.nome}</span>
                        <button onClick={()=>{setEditLojaIdx(idx);setEditLojaVal(loja.nome);}} style={{background:"rgba(0,82,204,0.3)",border:"1px solid rgba(0,82,204,0.5)",color:"#90B4E8",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer",fontWeight:600}}>✏️</button>
                        <button onClick={()=>setConfirmDeleteLoja(idx)} style={{background:"rgba(220,53,69,0.2)",border:"1px solid rgba(220,53,69,0.4)",color:"#FF6B7A",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer",fontWeight:600}}>🗑️</button>
                      </>
                    }
                  </div>
                ))}
              </div>
            }
            <div style={{marginTop:14}}><button onClick={()=>setShowLojas(false)} style={{...btnG,width:"100%"}}>Fechar</button></div>
          </div>
        </div>
      )}

      {/* MODAL USUÁRIOS */}
      {showUsuarios&&isAdmin&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>
          <div style={{background:"#13243A",borderRadius:18,padding:24,width:"100%",maxWidth:460,border:"1px solid rgba(255,255,255,0.12)",boxShadow:"0 24px 60px rgba(0,0,0,0.6)",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{color:"#fff",fontSize:17,fontWeight:800,marginBottom:4}}>👥 Gerenciar Usuários</div>
            <div style={{color:"#8BAED4",fontSize:13,marginBottom:14}}>Cadastre novos usuários com perfil de admin ou visualizador.</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
              <input placeholder="Nome completo" value={novoUsuario.nome} onChange={e=>setNovoUsuario(v=>({...v,nome:e.target.value}))} style={inp}/>
              <input placeholder="Usuário" value={novoUsuario.username} onChange={e=>setNovoUsuario(v=>({...v,username:e.target.value}))} style={inp}/>
              <input type="password" placeholder="Senha" value={novoUsuario.senha} onChange={e=>setNovoUsuario(v=>({...v,senha:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&createUsuario()} style={inp}/>
              <select value={novoUsuario.role} onChange={e=>setNovoUsuario(v=>({...v,role:e.target.value}))} style={sel}>
                <option value="viewer">Visualizador</option>
                <option value="admin">Admin</option>
              </select>
              <button onClick={createUsuario} disabled={savingUser} style={{...btnP,flex:"none",opacity:savingUser?0.7:1}}>
                {savingUser?"Criando usuário...":"+ Adicionar usuário"}
              </button>
            </div>
            {usuarios.length===0
              ?<div style={{textAlign:"center",color:"#5A7A99",padding:"18px 0"}}>Nenhum usuário cadastrado.</div>
              :<div style={{display:"flex",flexDirection:"column",gap:6}}>
                {usuarios.map(usuario=>(
                  <div key={usuario.id} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.10)",borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                    <div>
                      <div style={{color:"#fff",fontWeight:700,fontSize:13}}>{usuario.nome}</div>
                      <div style={{color:"#8BAED4",fontSize:12}}>@{usuario.username}</div>
                    </div>
                    <span style={{background:usuario.role==="admin"?"rgba(255,215,0,0.15)":"rgba(255,255,255,0.08)",color:usuario.role==="admin"?"#FFD700":"#C5D8F0",border:"1px solid rgba(255,255,255,0.15)",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:700}}>
                      {usuario.role==="admin"?"Admin":"Visualizador"}
                    </span>
                  </div>
                ))}
              </div>
            }
            <div style={{marginTop:14}}><button onClick={()=>setShowUsuarios(false)} style={{...btnG,width:"100%"}}>Fechar</button></div>
          </div>
        </div>
      )}

      {/* CONFIRM LOGOUT */}
      {showLogout&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
          <div style={{background:"#13243A",borderRadius:16,padding:28,width:300,border:"1px solid rgba(255,255,255,0.12)",textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:10}}>👋</div>
            <div style={{color:"#fff",fontSize:16,fontWeight:700,marginBottom:6}}>Sair do sistema?</div>
            <div style={{color:"#8BAED4",fontSize:13,marginBottom:20}}>Você precisará fazer login novamente.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowLogout(false)} style={btnG}>Cancelar</button>
              <button onClick={onLogout} style={{...btnP,background:"#DC3545"}}>Sair</button>
            </div>
          </div>
        </div>
      )}

      {/* CONFIRM DELETE PEDIDO */}
      {confirmDelete&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
          <div style={{background:"#13243A",borderRadius:16,padding:26,width:310,border:"1px solid rgba(220,53,69,0.3)",textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:10}}>🗑️</div>
            <div style={{color:"#fff",fontSize:15,fontWeight:700,marginBottom:6}}>Excluir pedido?</div>
            <div style={{color:"#8BAED4",fontSize:13,marginBottom:20}}>Todos os produtos deste cliente serão removidos.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmDelete(null)} style={btnG}>Cancelar</button>
              <button onClick={()=>delPedido(confirmDelete)} style={{...btnP,background:"#DC3545"}}>Excluir</button>
            </div>
          </div>
        </div>
      )}

      {/* CONFIRM DELETE LOJA */}
      {confirmDeleteLoja!==null&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
          <div style={{background:"#13243A",borderRadius:16,padding:26,width:330,border:"1px solid rgba(220,53,69,0.3)",textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:10}}>🏬</div>
            <div style={{color:"#fff",fontSize:15,fontWeight:700,marginBottom:6}}>Excluir "{lojas[confirmDeleteLoja]?.nome}"?</div>
            <div style={{color:"#8BAED4",fontSize:13,marginBottom:20}}>Os produtos desta loja ficarão sem loja associada.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmDeleteLoja(null)} style={btnG}>Cancelar</button>
              <button onClick={()=>deleteLoja(confirmDeleteLoja)} style={{...btnP,background:"#DC3545"}}>Excluir</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [loggedUser,setLoggedUser]=useState(null);
  if(!loggedUser) return <Login onLogin={setLoggedUser}/>;
  return <Main user={loggedUser} onLogout={()=>setLoggedUser(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
