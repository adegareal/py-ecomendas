<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PY Encomendas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D1B2A;font-family:'Segoe UI',system-ui,sans-serif}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:rgba(255,255,255,0.05)}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}
select option{background:#1B2B3A;color:#fff}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const SUPA_URL = "https://sisnsawccgnsttbxnobm.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpc25zYXdjY2duc3R0Ynhub2JtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NDgxMTgsImV4cCI6MjA5ODMyNDExOH0.0y38nM3wiHih-Yqx5zpd0qBl5RO8biKoCo2PWk6zWHk";
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const STATUS = ["Pendente","Em trânsito","Entregue","Cancelado"];
const STATUS_COLORS = {
  "Pendente":    {bg:"#FFF3CD",text:"#856404",dot:"#FFC107"},
  "Em trânsito": {bg:"#CCE5FF",text:"#004085",dot:"#007BFF"},
  "Entregue":    {bg:"#D4EDDA",text:"#155724",dot:"#28A745"},
  "Cancelado":   {bg:"#F8D7DA",text:"#721C24",dot:"#DC3545"},
};
const ITEM_STATUS = ["Aguardando pagamento","Produto comprado","Item finalizado"];
const ITEM_STATUS_COLORS = {
  "Aguardando pagamento":{bg:"#3D2A00",text:"#FFB347",dot:"#FFB347",icon:"⏳"},
  "Produto comprado":    {bg:"#002D4A",text:"#56CCF2",dot:"#56CCF2",icon:"🛒"},
  "Item finalizado":     {bg:"#0A2E1A",text:"#4ADE80",dot:"#4ADE80",icon:"✅"},
};
const NIVEL_LABELS = {
  super_admin:"Super Admin",
  admin_empresa:"Admin Empresa",
  manager:"Gerente",
  operador:"Operador",
  viewer:"Visualizador",
};

const fmtBRL = v => Number(v || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const uid = () => Math.random().toString(36).slice(2,9);
const norm = v => v.trim();
const slugify = value => value
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g, "")
  .toLowerCase()
  .replace(/[^a-z0-9]+/g, "-")
  .replace(/(^-|-$)/g, "");
const getNivelLabel = nivel => NIVEL_LABELS[nivel] || "Visualizador";
const isAdminLevel = nivel => ["super_admin","admin_empresa"].includes(nivel);
const roleFromNivel = nivel => isAdminLevel(nivel) ? "admin" : "viewer";
const emptyItem = loja => ({id:uid(),encomenda:"",valor:"",loja,itemStatus:"Aguardando pagamento"});

const inp = {width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.07)",color:"#fff",fontSize:14,outline:"none",boxSizing:"border-box"};
const sel = {...inp,background:"#1B2B3A",cursor:"pointer"};
const lbl = {color:"#8BAED4",fontSize:12,fontWeight:700,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:0.6};
const btnP = {flex:1,padding:"11px",borderRadius:8,border:"none",background:"linear-gradient(90deg,#003580,#0052CC)",color:"#fff",fontSize:15,cursor:"pointer",fontWeight:700};
const btnG = {flex:1,padding:"11px",borderRadius:8,border:"1px solid rgba(255,255,255,0.15)",background:"transparent",color:"#8BAED4",fontSize:15,cursor:"pointer",fontWeight:600};

function Login({onLogin}) {
  const [user,setUser]=useState("");
  const [pass,setPass]=useState("");
  const [erro,setErro]=useState("");
  const [loading,setLoading]=useState(false);
  const [showP,setShowP]=useState(false);

  const handleLogin = async () => {
    const username = norm(user);
    if(!username||!pass.trim()){setErro("Preencha usuário e senha.");return;}
    setLoading(true); setErro("");
    try {
      const {data,error} = await sb
        .from("usuarios")
        .select("id, username, nome, role, nivel, empresa_id, empresas(id, nome, slug)")
        .eq("username",username)
        .eq("senha",pass)
        .single();
      if(error||!data) setErro("Usuário ou senha incorretos.");
      else onLogin({...data, empresa:data.empresas, nivel:data.nivel || (data.role==="admin"?"admin_empresa":"viewer")});
    } catch(e){ setErro("Erro de conexão. Tente novamente."); }
    setLoading(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0D1B2A,#1B2B3A)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#13243A",borderRadius:20,padding:36,width:"100%",maxWidth:380,border:"1px solid rgba(255,255,255,0.10)",boxShadow:"0 24px 60px rgba(0,0,0,0.6)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:48,marginBottom:10}}>🛃</div>
          <div style={{color:"#fff",fontSize:22,fontWeight:800}}>PY Encomendas</div>
          <div style={{color:"#8BAED4",fontSize:13,marginTop:4}}>Faça login para continuar</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <label style={lbl}>Usuário</label>
            <input value={user} onChange={e=>setUser(e.target.value)} placeholder="Seu usuário" onKeyDown={e=>e.key==="Enter"&&handleLogin()} style={inp} autoFocus/>
          </div>
          <div>
            <label style={lbl}>Senha</label>
            <div style={{position:"relative"}}>
              <input type={showP?"text":"password"} value={pass} onChange={e=>setPass(e.target.value)} placeholder="Sua senha" onKeyDown={e=>e.key==="Enter"&&handleLogin()} style={{...inp,paddingRight:44}}/>
              <button type="button" onClick={()=>setShowP(p=>!p)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#8BAED4",cursor:"pointer",fontSize:16}}>
                {showP?"🙈":"👁️"}
              </button>
            </div>
          </div>
          {erro&&<div style={{background:"rgba(220,53,69,0.15)",border:"1px solid rgba(220,53,69,0.3)",color:"#FF6B7A",borderRadius:8,padding:"8px 12px",fontSize:13}}>{erro}</div>}
          <button onClick={handleLogin} disabled={loading} style={{...btnP,flex:"none",marginTop:4,padding:"12px",opacity:loading?0.7:1}}>
            {loading?"Entrando...":"Entrar"}
          </button>
        </div>
        <div style={{color:"#5A7A99",fontSize:11,textAlign:"center",marginTop:20}}>PY Encomendas · Acesso restrito</div>
      </div>
    </div>
  );
}

function Main({user,onLogout}) {
  const nivel = user.nivel || (user.role==="admin"?"admin_empresa":"viewer");
  const isSuperAdmin = nivel === "super_admin";
  const isAdmin = isAdminLevel(nivel);
  const canManageUsers = isAdmin;

  const [empresas,setEmpresas] = useState([]);
  const [selectedEmpresaId,setSelectedEmpresaId] = useState(user.empresa_id || "");
  const [pedidos,setPedidos] = useState([]);
  const [lojas,setLojas] = useState([]);
  const [usuarios,setUsuarios] = useState([]);
  const [loading,setLoading] = useState(true);
  const [saving,setSaving] = useState(false);
  const [savingUser,setSavingUser] = useState(false);
  const [savingEmpresa,setSavingEmpresa] = useState(false);
  const [showForm,setShowForm] = useState(false);
  const [showLojas,setShowLojas] = useState(false);
  const [showUsuarios,setShowUsuarios] = useState(false);
  const [showEmpresas,setShowEmpresas] = useState(false);
  const [showDetail,setShowDetail] = useState(null);
  const [editId,setEditId] = useState(null);
  const [search,setSearch] = useState("");
  const [filterStatus,setFilterStatus] = useState("Todos");
  const [confirmDelete,setConfirmDelete] = useState(null);
  const [confirmDeleteLoja,setConfirmDeleteLoja] = useState(null);
  const [novaLoja,setNovaLoja] = useState("");
  const [novaEmpresa,setNovaEmpresa] = useState({nome:"",slug:""});
  const [novoUsuario,setNovoUsuario] = useState({ nome:"", username:"", senha:"", nivel:"viewer", empresaId:user.empresa_id || "" });
  const [editLojaIdx,setEditLojaIdx] = useState(null);
  const [editLojaVal,setEditLojaVal] = useState("");
  const [showLogout,setShowLogout] = useState(false);
  const [toast,setToast] = useState(null);

  const activeEmpresaId = isSuperAdmin ? selectedEmpresaId : user.empresa_id;
  const activeEmpresa = useMemo(() => empresas.find(item => item.id === activeEmpresaId) || user.empresa || null, [empresas, activeEmpresaId, user.empresa]);
  const defaultLoja = lojas[0]?.nome || "";
  const [form,setForm] = useState({cliente:"",status:"Pendente",data:new Date().toISOString().split("T")[0],taxa:"",itens:[emptyItem("")]});

  const showToast = (msg,type="success") => {
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  };

  const loadAll = useCallback(async()=>{
    setLoading(true);
    try {
      const empresasQuery = isSuperAdmin
        ? sb.from("empresas").select("*").order("nome")
        : sb.from("empresas").select("*").eq("id", user.empresa_id).order("nome");
      const {data:empresasData=[]} = await empresasQuery;
      setEmpresas(empresasData || []);

      const tenantId = isSuperAdmin
        ? (selectedEmpresaId || user.empresa_id || empresasData?.[0]?.id || "")
        : user.empresa_id;

      if(isSuperAdmin && tenantId && tenantId !== selectedEmpresaId) {
        setSelectedEmpresaId(tenantId);
      }

      if(!tenantId) {
        setLojas([]);
        setPedidos([]);
        setUsuarios([]);
        setLoading(false);
        return;
      }

      const [{data:lj},{data:ped},{data:itns},{data:usrs}] = await Promise.all([
        sb.from("lojas").select("*").eq("empresa_id",tenantId).order("nome"),
        sb.from("pedidos").select("*").eq("empresa_id",tenantId).order("created_at",{ascending:false}),
        sb.from("itens").select("*").eq("empresa_id",tenantId).order("created_at"),
        sb.from("usuarios").select("id, nome, username, role, nivel, empresa_id, empresas(id, nome, slug)").eq("empresa_id",tenantId).order("created_at",{ascending:false}),
      ]);

      setLojas(lj||[]);
      setUsuarios((usrs||[]).map(item => ({...item, nivel:item.nivel || (item.role==="admin"?"admin_empresa":"viewer")})));
      const pedidosComItens = (ped||[]).map(p=>({
        ...p,
        taxa:Number(p.taxa)||0,
        itens:(itns||[]).filter(i=>i.pedido_id===p.id).map(i=>({...i,valor:Number(i.valor)||0,itemStatus:i.item_status}))
      }));
      setPedidos(pedidosComItens);
    } catch(e){
      showToast("Erro ao carregar dados.","error");
    }
    setLoading(false);
  },[isSuperAdmin, selectedEmpresaId, user.empresa_id]);

  useEffect(()=>{ loadAll(); },[loadAll]);

  useEffect(()=>{
    if(activeEmpresaId) {
      setNovoUsuario(v => ({...v, empresaId:isSuperAdmin ? (v.empresaId || activeEmpresaId) : activeEmpresaId}));
    }
  },[activeEmpresaId, isSuperAdmin]);

  const totals = useMemo(()=>({
    total:pedidos.length,
    valor:pedidos.reduce((s,p)=>s+p.itens.reduce((ss,i)=>ss+i.valor,0)+p.taxa,0),
    taxas:pedidos.reduce((s,p)=>s+p.taxa,0),
    pendente:pedidos.filter(p=>p.status==="Pendente").length,
    entregue:pedidos.filter(p=>p.status==="Entregue").length,
  }),[pedidos]);

  const totalProdutos = p => p.itens.reduce((s,i)=>s+Number(i.valor||0),0);
  const totalPedido = p => totalProdutos(p)+Number(p.taxa||0);

  const filtered = useMemo(()=>pedidos.filter(p=>{
    const q = search.toLowerCase();
    const matches = p.cliente.toLowerCase().includes(q) || p.itens.some(i=>i.encomenda.toLowerCase().includes(q)||i.loja.toLowerCase().includes(q));
    return matches && (filterStatus==="Todos" || p.status===filterStatus);
  }),[pedidos,search,filterStatus]);

  const openNew = ()=>{
    setForm({cliente:"",status:"Pendente",data:new Date().toISOString().split("T")[0],taxa:"",itens:[emptyItem(defaultLoja)]});
    setEditId(null);
    setShowForm(true);
  };

  const openEdit = pedido=>{
    setForm({
      cliente:pedido.cliente,
      status:pedido.status,
      data:pedido.data,
      taxa:String(pedido.taxa||""),
      itens:pedido.itens.map(i=>({...i,valor:String(i.valor)}))
    });
    setEditId(pedido.id);
    setShowForm(true);
  };

  const save = async()=>{
    if(!activeEmpresaId) return showToast("Selecione uma empresa.","error");
    if(!form.cliente.trim()) return showToast("Informe o cliente.","error");
    const itens = form.itens.filter(i=>i.encomenda.trim()).map(i=>({...i,valor:Number(i.valor)||0}));
    if(!itens.length) return showToast("Adicione ao menos um produto.","error");
    setSaving(true);
    try {
      const taxa = Number(form.taxa)||0;
      if(editId){
        await sb.from("pedidos").update({cliente:form.cliente,status:form.status,data:form.data,taxa,empresa_id:activeEmpresaId}).eq("id",editId);
        await sb.from("itens").delete().eq("pedido_id",editId);
        await sb.from("itens").insert(itens.map(i=>({pedido_id:editId,encomenda:i.encomenda,valor:i.valor,loja:i.loja,item_status:i.itemStatus,empresa_id:activeEmpresaId})));
        showToast("Pedido atualizado!");
      } else {
        const {data:newP,error:newPError} = await sb.from("pedidos").insert({cliente:form.cliente,status:form.status,data:form.data,taxa,empresa_id:activeEmpresaId}).select().single();
        if(newPError||!newP) throw new Error("create-order");
        await sb.from("itens").insert(itens.map(i=>({pedido_id:newP.id,encomenda:i.encomenda,valor:i.valor,loja:i.loja,item_status:i.itemStatus,empresa_id:activeEmpresaId})));
        showToast("Pedido criado!");
      }
      await loadAll();
      setShowForm(false);
    } catch(e){
      showToast("Erro ao salvar pedido.","error");
    }
    setSaving(false);
  };

  const delPedido = async id=>{
    try {
      await sb.from("pedidos").delete().eq("id",id);
      await loadAll();
      setConfirmDelete(null);
      setShowDetail(null);
      showToast("Pedido excluído.");
    } catch(e){
      showToast("Erro ao excluir.","error");
    }
  };

  const setItem = (idx,key,val)=>setForm(f=>({...f,itens:f.itens.map((it,i)=>i===idx?{...it,[key]:val}:it)}));
  const addItem = ()=>setForm(f=>({...f,itens:[...f.itens,emptyItem(defaultLoja)]}));
  const removeItem = idx=>setForm(f=>({...f,itens:f.itens.filter((_,i)=>i!==idx)}));

  const addLoja = async()=>{
    const nome = novaLoja.trim();
    if(!activeEmpresaId) return showToast("Selecione uma empresa.","error");
    if(!nome) return;
    try {
      const {error} = await sb.from("lojas").insert({nome,empresa_id:activeEmpresaId});
      if(error) showToast("Erro ao adicionar loja.","error");
      else {
        await loadAll();
        setNovaLoja("");
        showToast("Loja adicionada!");
      }
    } catch(e){ showToast("Erro ao adicionar loja.","error"); }
  };

  const saveEditLoja = async idx=>{
    const novo = editLojaVal.trim();
    if(!novo) return;
    const loja = lojas[idx];
    try {
      await sb.from("lojas").update({nome:novo}).eq("id",loja.id);
      await sb.from("itens").update({loja:novo}).eq("empresa_id",activeEmpresaId).eq("loja",loja.nome);
      await loadAll();
      setEditLojaIdx(null);
      showToast("Loja atualizada!");
    } catch(e){ showToast("Erro ao editar loja.","error"); }
  };

  const deleteLoja = async idx=>{
    const loja = lojas[idx];
    try {
      await sb.from("lojas").delete().eq("id",loja.id);
      await loadAll();
      setConfirmDeleteLoja(null);
      showToast("Loja excluída.");
    } catch(e){ showToast("Erro ao excluir loja.","error"); }
  };

  const createEmpresa = async()=>{
    const nome = norm(novaEmpresa.nome);
    const slug = slugify(novaEmpresa.slug || nome);
    if(!nome || !slug) return showToast("Preencha o nome da empresa.","error");
    setSavingEmpresa(true);
    try {
      const {data,error} = await sb.from("empresas").insert({nome,slug}).select().single();
      if(error || !data) {
        showToast("Erro ao criar empresa.","error");
      } else {
        setNovaEmpresa({nome:"",slug:""});
        setSelectedEmpresaId(data.id);
        await loadAll();
        showToast("Empresa criada com sucesso!");
      }
    } catch(e) {
      showToast("Erro ao criar empresa.","error");
    }
    setSavingEmpresa(false);
  };

  const createUsuario = async()=>{
    const nome = norm(novoUsuario.nome);
    const username = norm(novoUsuario.username);
    const senha = novoUsuario.senha.trim();
    const empresaId = isSuperAdmin ? (novoUsuario.empresaId || activeEmpresaId) : user.empresa_id;
    const nivelNovo = novoUsuario.nivel;

    if(!empresaId) return showToast("Selecione uma empresa.","error");
    if(!nome||!username||!senha) return showToast("Preencha nome, usuário e senha.","error");
    if(senha.length < 4) return showToast("A senha deve ter pelo menos 4 caracteres.","error");

    setSavingUser(true);
    try {
      const {data:existingUser,error:existingError} = await sb.from("usuarios").select("id").eq("username",username).maybeSingle();
      if(existingError) {
        showToast("Erro ao verificar usuário.","error");
      } else if(existingUser) {
        showToast("Este usuário já existe.","error");
      } else {
        const {error:createError} = await sb.from("usuarios").insert({
          nome,
          username,
          senha,
          empresa_id:empresaId,
          nivel:nivelNovo,
          role:roleFromNivel(nivelNovo),
        });
        if(createError) showToast("Erro ao criar usuário.","error");
        else {
          setNovoUsuario({ nome:"", username:"", senha:"", nivel:"viewer", empresaId:isSuperAdmin ? empresaId : user.empresa_id });
          await loadAll();
          showToast("Usuário criado com sucesso!");
        }
      }
    } catch(e) {
      showToast("Erro ao criar usuário.","error");
    }
    setSavingUser(false);
  };

  if(loading) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0D1B2A,#1B2B3A)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:40}}>🛃</div>
      <div style={{color:"#8BAED4",fontSize:15}}>Carregando dados...</div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0D1B2A,#1B2B3A)",fontFamily:"'Segoe UI',system-ui,sans-serif",paddingBottom:40}}>
      {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:999,background:toast.type==="error"?"#DC3545":"#28A745",color:"#fff",borderRadius:10,padding:"10px 18px",fontWeight:600,fontSize:14,boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>{toast.type==="error"?"❌":"✅"} {toast.msg}</div>}

      <div style={{background:"linear-gradient(90deg,#003580,#0052CC)",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",rowGap:8,boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>
        <div style={{fontSize:26}}>🛃</div>
        <div>
          <div style={{color:"#fff",fontSize:19,fontWeight:800}}>PY Encomendas</div>
          <div style={{color:"#90B4E8",fontSize:11}}>{activeEmpresa?.nome || "Sem empresa selecionada"}</div>
        </div>

        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          {isSuperAdmin && (
            <select value={selectedEmpresaId} onChange={e=>setSelectedEmpresaId(e.target.value)} style={{...sel,width:220,padding:"7px 11px",fontSize:13,border:"1px solid rgba(255,255,255,0.25)"}}>
              {empresas.map(empresa=><option key={empresa.id} value={empresa.id}>{empresa.nome}</option>)}
            </select>
          )}

          {isSuperAdmin&&<button onClick={()=>setShowEmpresas(true)} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"7px 13px",fontWeight:600,fontSize:13,cursor:"pointer"}}>🏢 Empresas</button>}
          {canManageUsers&&<button onClick={()=>setShowUsuarios(true)} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"7px 13px",fontWeight:600,fontSize:13,cursor:"pointer"}}>👥 Usuários</button>}
          {isAdmin&&<button onClick={()=>setShowLojas(true)} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"7px 13px",fontWeight:600,fontSize:13,cursor:"pointer"}}>🏪 Lojas</button>}
          {isAdmin&&<button onClick={openNew} style={{background:"#FFD700",color:"#0D1B2A",border:"none",borderRadius:8,padding:"7px 15px",fontWeight:700,fontSize:13,cursor:"pointer"}}>+ Novo Pedido</button>}

          <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.1)",borderRadius:8,padding:"6px 12px",cursor:"pointer"}} onClick={()=>setShowLogout(true)}>
            <div style={{width:28,height:28,borderRadius:"50%",background:"#FFD700",display:"flex",alignItems:"center",justifyContent:"center",color:"#0D1B2A",fontWeight:800,fontSize:12}}>{user.nome.charAt(0)}</div>

              <input placeholder="Nome da empresa" value={novaEmpresa.nome} onChange={e=>setNovaEmpresa(v=>({...v,nome:e.target.value,slug:v.slug||slugify(e.target.value)}))} style={inp}/>
              <input placeholder="Slug da empresa" value={novaEmpresa.slug} onChange={e=>setNovaEmpresa(v=>({...v,slug:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&createEmpresa()} style={inp}/>
              <button onClick={createEmpresa} disabled={savingEmpresa} style={{...btnP,flex:"none",opacity:savingEmpresa?0.7:1}}>{savingEmpresa?"Criando empresa...":"+ Adicionar empresa"}</button>
            </div>
            {empresas.length===0
              ?<div style={{textAlign:"center",color:"#5A7A99",padding:"18px 0"}}>Nenhuma empresa cadastrada.</div>
              :<div style={{display:"flex",flexDirection:"column",gap:6}}>{empresas.map(empresa=>(
                  <div key={empresa.id} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.10)",borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                    <div>
                      <div style={{color:"#fff",fontWeight:700,fontSize:13}}>{empresa.nome}</div>
                      <div style={{color:"#8BAED4",fontSize:12}}>{empresa.slug}</div>
                    </div>
                    <button onClick={()=>{setSelectedEmpresaId(empresa.id);setShowEmpresas(false);}} style={{background:"rgba(0,82,204,0.3)",border:"1px solid rgba(0,82,204,0.5)",color:"#90B4E8",borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>Abrir</button>
                  </div>
                ))}</div>
            }
            <div style={{marginTop:14}}><button onClick={()=>setShowEmpresas(false)} style={{...btnG,width:"100%"}}>Fechar</button></div>
          </div>
        </div>
      )}

      {showLogout&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
          <div style={{background:"#13243A",borderRadius:16,padding:28,width:300,border:"1px solid rgba(255,255,255,0.12)",textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:10}}>👋</div>
            <div style={{color:"#fff",fontSize:16,fontWeight:700,marginBottom:6}}>Sair do sistema?</div>
            <div style={{color:"#8BAED4",fontSize:13,marginBottom:20}}>Você precisará fazer login novamente.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowLogout(false)} style={btnG}>Cancelar</button>
              <button onClick={onLogout} style={{...btnP,background:"#DC3545"}}>Sair</button>
            </div>
          </div>
        </div>
      )}

      {confirmDelete&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
          <div style={{background:"#13243A",borderRadius:16,padding:26,width:310,border:"1px solid rgba(220,53,69,0.3)",textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:10}}>🗑️</div>
            <div style={{color:"#fff",fontSize:15,fontWeight:700,marginBottom:6}}>Excluir pedido?</div>
            <div style={{color:"#8BAED4",fontSize:13,marginBottom:20}}>Todos os produtos deste cliente serão removidos.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmDelete(null)} style={btnG}>Cancelar</button>
              <button onClick={()=>delPedido(confirmDelete)} style={{...btnP,background:"#DC3545"}}>Excluir</button>
            </div>
          </div>
        </div>
      )}

      {confirmDeleteLoja!==null&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
          <div style={{background:"#13243A",borderRadius:16,padding:26,width:330,border:"1px solid rgba(220,53,69,0.3)",textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:10}}>🏬</div>
            <div style={{color:"#fff",fontSize:15,fontWeight:700,marginBottom:6}}>Excluir "{lojas[confirmDeleteLoja]?.nome}"?</div>
            <div style={{color:"#8BAED4",fontSize:13,marginBottom:20}}>Os produtos desta loja ficarão sem loja associada.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmDeleteLoja(null)} style={btnG}>Cancelar</button>
              <button onClick={()=>deleteLoja(confirmDeleteLoja)} style={{...btnP,background:"#DC3545"}}>Excluir</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [loggedUser,setLoggedUser]=useState(null);
  if(!loggedUser) return <Login onLogin={setLoggedUser}/>;
  return <Main user={loggedUser} onLogout={()=>setLoggedUser(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
